<div class="auth-wrapper">

  <!-- Left Panel -->
  <div class="auth-left">
    <video autoplay loop muted playsinline class="auth-video">
      <source src="video/Login_Register_Video.mp4" type="video/mp4">
    </video>
    <div class="auth-left-overlay"></div>
    <div class="auth-left-content">
      <div class="auth-brand">
        <i class="bi bi-airplane-fill"></i>
        <span class="bw">Velo</span><span class="bo">skyra</span>
      </div>
      <h2>Secure Your<br/>Account</h2>
      <p>Need to reset your password? Enter your email and we'll send you a link to get back into your account securely.</p>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right">
    <div class="auth-form-wrapper">

      <div class="auth-form-header">
        <div class="auth-form-icon">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h3>Forgot Password</h3>
        <p>Enter your email to reset your password</p>
      </div>

      <div class="alert alert-danger rounded-3" *ngIf="error">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
      </div>

      <div class="alert alert-success rounded-3" *ngIf="message">
        <i class="bi bi-check-circle-fill me-2"></i>{{ message }}
      </div>

      <div class="auth-field" *ngIf="!message">
        <label>Email address</label>
        <div class="auth-input-group">
          <i class="bi bi-envelope"></i>
          <input type="email" placeholder="your@email.com" [(ngModel)]="email" (keyup.enter)="submit()" />
        </div>
      </div>

      <button class="auth-btn" (click)="submit()" [disabled]="loading" *ngIf="!message">
        <span *ngIf="!loading"><i class="bi bi-envelope-paper-fill me-2"></i>Send Reset Link</span>
        <span *ngIf="loading"><span class="spinner-border spinner-border-sm me-2"></span>Sending...</span>
      </button>

      <div class="mt-4" *ngIf="message">
        <button class="auth-btn" routerLink="/login">
          <i class="bi bi-arrow-left me-2"></i>Return to Login
        </button>
      </div>

      <p class="auth-switch" *ngIf="!message">
        Remember your password?
        <a routerLink="/login">Sign in</a>
      </p>

    </div>
  </div>

</div>
