<div class="auth-wrapper">

  <!-- Left Panel -->
  <div class="auth-left">
    <video autoplay loop muted playsinline class="auth-video">
      <source src="video/Login_Register_Video.mp4" type="video/mp4">
    </video>
    <div class="auth-left-overlay"></div>
    <div class="auth-left-content">
      <div class="auth-brand">
        <i class="bi bi-airplane-fill"></i>
        <span class="bw">Velo</span><span class="bo">skyra</span>
      </div>
      <h2>Your Journey<br/>Begins Here</h2>
      <p>Book flights, manage trips and track bookings — all in one place.</p>
      <div class="auth-features">
        <div class="auth-feature"><i class="bi bi-check-circle-fill"></i> Real-time seat selection</div>
        <div class="auth-feature"><i class="bi bi-check-circle-fill"></i> Instant PNR confirmation</div>
        <div class="auth-feature"><i class="bi bi-check-circle-fill"></i> Secure Razorpay payments</div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right">
    <div class="auth-form-wrapper">

      <div class="auth-form-header">
        <div class="auth-form-icon">
          <i class="bi bi-airplane-fill"></i>
        </div>
        <h3>Welcome Back</h3>
        <p>Sign in to your Veloskyra account</p>
      </div>

      <div class="alert alert-danger rounded-3" *ngIf="error">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
      </div>

      <div class="auth-field">
        <label>Email address</label>
        <div class="auth-input-group">
          <i class="bi bi-envelope"></i>
          <input type="email" placeholder="your@email.com" [(ngModel)]="email" />
        </div>
      </div>

      <div class="auth-field">
        <div class="auth-field-header">
          <label>Password</label>
          <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>
        <div class="auth-input-group">
          <i class="bi bi-lock"></i>
          <input type="password" placeholder="••••••••" [(ngModel)]="password" (keyup.enter)="login()" />
        </div>
      </div>

      <button class="auth-btn" (click)="login()" [disabled]="loading">
        <span *ngIf="!loading"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
        <span *ngIf="loading"><span class="spinner-border spinner-border-sm me-2"></span>Signing in...</span>
      </button>

      <p class="auth-switch">
        Don't have an account?
        <a routerLink="/register">Create one free</a>
      </p>

    </div>
  </div>

</div>
