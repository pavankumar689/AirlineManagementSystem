<div class="auth-wrapper">

  <!-- Left Panel -->
  <div class="auth-left">
    <video autoplay loop muted playsinline class="auth-video">
      <source src="video/Login_Register_Video.mp4" type="video/mp4">
    </video>
    <div class="auth-left-overlay"></div>
    <div class="auth-left-content">
      <div class="auth-brand">
        <i class="bi bi-airplane-fill"></i>
        <span class="bw">Velo</span><span class="bo">skyra</span>
      </div>
      <h2>Secure Your<br/>Account</h2>
      <p>Please enter your new password below. Make sure it's strong and unique to keep your account safe.</p>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right">
    <div class="auth-form-wrapper">

      <div class="auth-form-header">
        <div class="auth-form-icon">
          <i class="bi bi-key-fill"></i>
        </div>
        <h3>Reset Password</h3>
        <p>Choose a new password for your account</p>
      </div>

      <div class="alert alert-danger rounded-3" *ngIf="error">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
      </div>

      <div class="alert alert-success rounded-3" *ngIf="message">
        <i class="bi bi-check-circle-fill me-2"></i>{{ message }}
      </div>

      <div *ngIf="!message && userId && token">
        <div class="auth-field">
          <label>New Password</label>
          <div class="auth-input-group">
            <i class="bi bi-lock-fill"></i>
            <input type="password" placeholder="••••••••" [(ngModel)]="newPassword" />
          </div>
        </div>

        <div class="auth-field">
          <label>Confirm Password</label>
          <div class="auth-input-group">
            <i class="bi bi-shield-lock"></i>
            <input type="password" placeholder="••••••••" [(ngModel)]="confirmPassword" (keyup.enter)="submit()" />
          </div>
        </div>

        <button class="auth-btn" (click)="submit()" [disabled]="loading">
          <span *ngIf="!loading"><i class="bi bi-arrow-right-circle-fill me-2"></i>Reset Password</span>
          <span *ngIf="loading"><span class="spinner-border spinner-border-sm me-2"></span>Resetting...</span>
        </button>
      </div>

      <div class="mt-4" *ngIf="message || (!userId || !token)">
        <button class="auth-btn" routerLink="/login">
          <i class="bi bi-arrow-left me-2"></i>Return to Login
        </button>
      </div>

      <p class="auth-switch" *ngIf="!message">
        Remembered your password?
        <a routerLink="/login">Sign in</a>
      </p>

    </div>
  </div>

</div>
