<nav class="navbar">
  <div class="container-fluid px-4">

    <!-- Brand -->
    <a routerLink="/" class="navbar-brand" title="Go to Landing Page">
      <i class="bi bi-airplane-fill"></i>
      <span>Veloskyra</span>
    </a>

    <!-- Nav Links -->
    <div class="nav-links">
      <a routerLink="/home" routerLinkActive="active"
        [routerLinkActiveOptions]="{exact:true}" class="nav-link">
        <i class="bi bi-house me-1"></i>Home
      </a>

      <a routerLink="/my-bookings" routerLinkActive="active"
        class="nav-link" *ngIf="auth.isLoggedIn()">
        <i class="bi bi-ticket-perforated me-1"></i>My Bookings
      </a>
        <a routerLink="/flight-status" routerLinkActive="active"
            class="nav-link">
            <i class="bi bi-radar me-1"></i>Flight Status
        </a>
         <a routerLink="/profile" routerLinkActive="active"
        class="nav-link" *ngIf="auth.isLoggedIn()">
        <i class="bi bi-person-circle me-1"></i>Profile
        </a>
        <a routerLink="/flight-alerts" routerLinkActive="active"
          class="nav-link" *ngIf="auth.isLoggedIn()">
          <i class="bi bi-bell me-1"></i>Alerts
        </a>
        <a routerLink="/baggage-info" routerLinkActive="active" class="nav-link">
          <i class="bi bi-luggage me-1"></i>Baggage
        </a>
    </div>

    <!-- Auth Buttons -->
    <div class="auth-section">
      <ng-container *ngIf="!auth.isLoggedIn()">
        <a routerLink="/login" class="btn btn-outline-light btn-sm me-2">
          Login
        </a>
        <a routerLink="/register" class="btn btn-light btn-sm">
          Register
        </a>
      </ng-container>

      <ng-container *ngIf="auth.isLoggedIn()">
        <div class="user-info">
          <i class="bi bi-person-circle me-2"></i>
          <span>{{ auth.getName() }}</span>
        </div>
        <button class="btn btn-outline-light btn-sm ms-3" (click)="logout()">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </ng-container>
    </div>

  </div>
</nav>
